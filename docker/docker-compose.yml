services:
  db:
    image: postgres:16-alpine
    container_name: cian-db
    environment:
      POSTGRES_DB: cian
      POSTGRES_USER: cian
      POSTGRES_PASSWORD: cian
    ports:
      - "5433:5432"
    volumes:
      - cian_pgdata:/var/lib/postgresql/data
      - ../src/sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ../src/sql/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cian -d cian"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3-management
    container_name: cian-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: cian
      RABBITMQ_DEFAULT_PASS: cian
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_port_connectivity"]
      interval: 5s
      timeout: 10s
      retries: 15
      start_period: 120s

  mailpit:
    image: axllent/mailpit:v1.21
    container_name: cian-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    healthcheck:
      test: ["CMD", "/mailpit", "readyz"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  app:
    image: cian-app:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: cian-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker,api,bitrix
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: cian
      DB_USER: cian
      DB_PASSWORD: cian
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: cian
      RABBITMQ_PASSWORD: cian
      MAIL_HOST: mailpit
      MAIL_PORT: "1025"
      MAIL_FROM: no-reply@cian.local
      JWT_SECRET: docker-dev-secret
      BITRIX_REST_BASE_URL: ${BITRIX_REST_BASE_URL:-}
      BITRIX_POLLING_INTERVAL_SECONDS: ${BITRIX_POLLING_INTERVAL_SECONDS:-20}
      BITRIX_DEAL_CATEGORY_ID: ${BITRIX_DEAL_CATEGORY_ID:-0}
      BITRIX_DEAL_FIELD_LISTING_ID: ${BITRIX_DEAL_FIELD_LISTING_ID:-UF_CRM_1779488860318}
      BITRIX_DEAL_FIELD_PROMOTION: ${BITRIX_DEAL_FIELD_PROMOTION:-UF_CRM_1779488339299}
      BITRIX_DEAL_FIELD_ADDRESS: ${BITRIX_DEAL_FIELD_ADDRESS:-UF_CRM_1779544026161}
      BITRIX_DEAL_FIELD_AREA: ${BITRIX_DEAL_FIELD_AREA:-UF_CRM_1779543509002}
      BITRIX_DEAL_FIELD_ROOMS: ${BITRIX_DEAL_FIELD_ROOMS:-UF_CRM_1779543524624}
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mailpit:
        condition: service_healthy

  worker-1:
    image: cian-app:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: cian-worker-1
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker,worker
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: cian
      DB_USER: cian
      DB_PASSWORD: cian
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: cian
      RABBITMQ_PASSWORD: cian
      MAIL_HOST: mailpit
      MAIL_PORT: "1025"
      MAIL_FROM: no-reply@cian.local
      JWT_SECRET: docker-dev-secret
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mailpit:
        condition: service_healthy

  worker-2:
    image: cian-app:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: cian-worker-2
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker,worker
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: cian
      DB_USER: cian
      DB_PASSWORD: cian
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: cian
      RABBITMQ_PASSWORD: cian
      MAIL_HOST: mailpit
      MAIL_PORT: "1025"
      MAIL_FROM: no-reply@cian.local
      JWT_SECRET: docker-dev-secret
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mailpit:
        condition: service_healthy

volumes:
  cian_pgdata:
