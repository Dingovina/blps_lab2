server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

spring:
  application:
    name: cian
  datasource:
    jndi-name: java:/jdbc/studs
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        default_schema: ${DB_SCHEMA:s409599}
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    secret: ${JWT_SECRET:cianSecretKeyForDevelopmentOnlyChangeInProduction}
    expiration-ms: 86400000
  admin:
    email: admin@cian.local
    password: admin123
  listing:
    publication-days: 30
    archive-grace-days: 7
