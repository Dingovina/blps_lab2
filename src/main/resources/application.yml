server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

spring:
  application:
    name: cian
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_STARTTLS:false}
  datasource:
    jndi-name: java:/jdbc/studs
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        default_schema: ${DB_SCHEMA:s409599}
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    secret: ${JWT_SECRET:cianSecretKeyForDevelopmentOnlyChangeInProduction}
    expiration-ms: 86400000
  admin:
    email: admin@cian.local
    password: admin123
  listing:
    publication-days: 30
    archive-grace-days: 7
  weekly-stats:
    cron: "0 0 9 * * MON"
  messaging:
    notifications-queue: ${NOTIFICATIONS_QUEUE:cian.notifications}
    listener-concurrency: ${NOTIFICATIONS_LISTENER_CONCURRENCY:1}
    rabbitmq:
      host: ${RABBITMQ_HOST:localhost}
      port: ${RABBITMQ_PORT:5672}
      username: ${RABBITMQ_USER:cian}
      password: ${RABBITMQ_PASSWORD:cian}
      virtual-host: ${RABBITMQ_VHOST:/}
  mail:
    from: ${MAIL_FROM:no-reply@cian.local}
    brand-name: ${MAIL_BRAND_NAME:Cian}
    support-email: ${MAIL_SUPPORT:support@cian.local}
