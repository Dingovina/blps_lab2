<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title th:text="${title}">Уведомление</title>
</head>
<body style="margin:0;padding:0;background-color:#eef1f6;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;color:#1a1f36;-webkit-font-smoothing:antialiased;">
<table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color:#eef1f6;padding:32px 16px;">
    <tr>
        <td align="center">
            <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="600" style="max-width:600px;width:100%;">
                <tr>
                    <td style="padding:0 0 20px 0;">
                        <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
                            <tr>
                                <td align="left" style="vertical-align:middle;">
                                    <span style="display:inline-block;font-size:22px;font-weight:700;letter-spacing:-0.02em;color:#0066ff;"
                                          th:text="${brandName}">Cian</span>
                                </td>
                                <td align="right" style="vertical-align:middle;">
                                    <span th:if="${typeLabel != null}"
                                          style="display:inline-block;padding:6px 12px;border-radius:999px;background-color:#e8f1ff;color:#0052cc;font-size:12px;font-weight:600;letter-spacing:0.02em;text-transform:uppercase;"
                                          th:text="${typeLabel}">Уведомление</span>
                                </td>
                            </tr>
                        </table>
                    </td>
                </tr>
                <tr>
                    <td style="background-color:#ffffff;border-radius:12px;box-shadow:0 4px 24px rgba(16,24,40,0.08);overflow:hidden;">
                        <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
                            <tr>
                                <td style="height:4px;background:linear-gradient(90deg,#0066ff 0%,#3385ff 100%);font-size:0;line-height:0;">&nbsp;</td>
                            </tr>
                            <tr>
                                <td style="padding:32px 36px 28px 36px;">
                                    <h1 style="margin:0 0 16px 0;font-size:24px;line-height:1.3;font-weight:700;color:#101828;"
                                        th:text="${title}">Заголовок уведомления</h1>
                                    <p th:each="line : ${bodyLines}"
                                       style="margin:0 0 12px 0;font-size:16px;line-height:1.6;color:#344054;"
                                       th:text="${line}">Текст уведомления</p>
                                </td>
                            </tr>
                        </table>
                    </td>
                </tr>
                <tr>
                    <td style="padding:24px 8px 0 8px;">
                        <p style="margin:0 0 8px 0;font-size:13px;line-height:1.5;color:#667085;text-align:center;">
                            Это автоматическое уведомление сервиса
                            <span th:text="${brandName}">Cian</span>.
                            Пожалуйста, не отвечайте на это письмо.
                        </p>
                        <p style="margin:0;font-size:13px;line-height:1.5;color:#667085;text-align:center;">
                            По вопросам обращайтесь:
                            <a th:href="'mailto:' + ${supportEmail}"
                               th:text="${supportEmail}"
                               style="color:#0066ff;text-decoration:none;">support@cian.local</a>
                        </p>
                        <p style="margin:16px 0 0 0;font-size:12px;line-height:1.5;color:#98a2b3;text-align:center;"
                           th:text="'© ' + ${year} + ' ' + ${brandName}">© 2026 Cian</p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
